version: '3.8'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: codexa_user
      POSTGRES_PASSWORD: codexa_password
      POSTGRES_DB: codexa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codexa_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://codexa_user:codexa_password@db:5432/codexa_db
      - ENV=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

volumes:
  postgres_data: